<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Касса Почты</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f4f6;margin:0;padding:0} .page{display:none;padding:30px;max-width:500px;margin:auto} .active{display:block} input,button,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;font-size:16px} button{background:#2563eb;color:#fff;border:none;cursor:pointer} button:hover{background:#1d4ed8}.error{color:red}.row{display:flex;gap:10px}.row button{flex:1}.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}.modal-content{background:#fff;padding:20px;border-radius:12px;width:90%;max-width:400px;position:relative}.close{position:absolute;right:10px;top:5px;font-size:24px;cursor:pointer}
</style>
</head>
<body>
<div id='loginPage' class='page active'>
<h2>Вход</h2>
<input id='login' placeholder='Логин'>
<div id='loginErr' class='error'></div>
<input id='password' type='password' placeholder='Пароль'>
<div id='passErr' class='error'></div>
<button onclick='login()'>Войти</button>
</div>
<div id='menuPage' class='page'>
<h2>Меню</h2>
<div class='row'><button onclick='showPage("sendPage")'>Отправить</button><button onclick='preparePickup()'>Выдать</button></div>
</div>
<div id='sendPage' class='page'>
<h2>Отправить</h2>
<input id='sender' placeholder='Номер телефона отправителя'>
<input id='receiver' placeholder='Номер телефона получателя'>
<input id='city' placeholder='Город'>
<input id='branch' placeholder='Отделение'>
<button onclick='createSendOrder()'>Создать заказ и перейти к оплате</button>
</div>
<div id='pickupPage' class='page'>
<h2>Выдать</h2>
<p>Код: <span id='pickupCode'></span></p>
<p>Сумма заказа: <span id='pickupSum'></span> грн</p>
<button onclick='goPayment()'>Перейти к оплате</button>
</div>
<div id='paymentPage' class='page'>
<h2>Оплата</h2>
<p>Сумма: <span id='paySum'></span> грн</p>
<div class='row'><button onclick='payCard()'>Карта</button><button onclick='openCash()'>Наличные</button></div>
<div id='payResult'></div>
<button onclick='finishVisit()'>Завершить визит</button>
</div>
<div id='cashModal' class='modal'>
<div class='modal-content'>
<div class='close' onclick='closeCash()'>×</div>
<h3>Наличные</h3>
<p>К оплате: <span id='cashSum'></span> грн</p>
<input id='cashGiven' placeholder='Сколько дал клиент' oninput='calcChange()'>
<p>Сдача: <span id='change'>0</span> грн</p>
</div></div>
<script>
let currentSum=0;

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}

function generateSum(){
  const min=50;
  const max=30000;
  const step=50;
  const count=Math.floor((max-min)/step)+1;
  const n=Math.floor(Math.random()*count);
  return min + n*step;
}

function login(){
  let l=document.getElementById('login').value.trim(),
      p=document.getElementById('password').value.trim();
  document.getElementById('loginErr').textContent='';
  document.getElementById('passErr').textContent='';
  let ok=true;
  if(!(l==='1'||l==='2')){
    document.getElementById('loginErr').textContent='Неправильный логин';ok=false;
  }else{
    if((l==='1'&&p!=='11')||(l==='2'&&p!=='22')){
      document.getElementById('passErr').textContent='Неправильный пароль';ok=false;
    }
  }
  if(ok)showPage('menuPage');
}

function createSendOrder(){
  currentSum=generateSum();
  goPayment();
}

function preparePickup(){
  currentSum=generateSum();
  pickupCode.textContent=Math.floor(1000+Math.random()*9000);
  pickupSum.textContent=currentSum;
  showPage('pickupPage');
}

function goPayment(){
  paySum.textContent=currentSum;
  payResult.textContent='';
  showPage('paymentPage');
}

function payCard(){
  let success=Math.random()>0.4;
  payResult.innerHTML=success?'<span style="color:green">Оплата прошла</span>':'<span style="color:red">Оплата не прошла</span>';
}

function openCash(){
  cashSum.textContent=currentSum;
  cashGiven.value='';
  change.textContent='0';
  cashModal.style.display='flex';
}

function closeCash(){
  cashModal.style.display='none';
}

function calcChange(){
  let given=parseFloat(cashGiven.value)||0;
  let c=given-currentSum;
  change.textContent=c>0?c.toFixed(2):0;
}

function finishVisit(){
  alert('Визит завершён');
  showPage('menuPage');
}
</script>
</body>
</html>
